<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crud - Veículos</title>

    <link rel="stylesheet" href="css/style.css">

    <script src="js/script.js" defer></script>
</head>

<body>
    <div id="geral">
        <header id="cabecalho">
            <div id="titulo-logo">
                Veículo
            </div>
            <div id="logo">
                <img src="imagens/logo.png" alt="Logo Veículo" title="Logo Veículo">
            </div>
        </header>
        <div id="div-form">
            <form name="form-veiculos" id="form-veiculos">
                <input type="text" name="modelo" id="modelo" class="input-txt01" maxlength="35" placeholder="Modelo" required>

                <input type="text" name="marca" id="marca" class="input-txt01" maxlength="15" placeholder="Marca" required>

                <input type="text" name="placa" id="placa" class="input-txt02" maxlength="7" placeholder="Placa" required>

                <input type="number" name="ano" id="ano" class="input-num" maxlength="9" placeholder="Ano Fabricação" required>

                <input type="number" name="valor" id="valor" class="input-num" maxlength="12" placeholder="Valor de Mercado" required>

                <div id="tipo-combustivel">
                    <input type="radio" name="tpCombustivel" id="gasolina" class="radio-combustivel" required value="g">Gasolina
                    <input type="radio" name="tpCombustivel" id="etanol" class="radio-combustivel" required value="e">Etanol
                    <input type="radio" name="tpCombustivel" id="bicombustivel" class="radio-combustivel" required value="b">Bicombustível
                    <input type="radio" name="tpCombustivel" id="etanol" class="radio-combustivel" required value="h">Híbrido
                    <input type="radio" name="tpCombustivel" id="eletrico" class="radio-combustivel" required value="e">Elétrico
                </div>

                <div id="div-btns">
                    <button type="submit" id="btn-enviar"> Cadastrar </button>
                    <button type="reset" id="btn-limpar"> Limpar </button>
                </div>
            </form>
        </div>
        <div id="div-lista">
            <h3 id="titulo-lista">Lista Veículos</h3>

            <div id="cabecalho-lista">
                <span class="txt alg"> Modelo </span>
                <span class="txt alg"> Marca </span>
                <span class="txt alg"> Placa </span>
                <span class="txt alg"> Tempo </span>
                <span class="txt alg"> Seguro </span>
                <span class="txt alg"> IPVA </span>
                <span class="txt alg"> Licenciamento </span>
                <span class="img alg"></span>
                <span class="img alg"></span>
            </div>
            
            <div id="div-veiculo">
                <div class="veiculo">
                    <span class="txt"> Fusca </span>
                    <span class="txt"> VW </span>
                    <span class="txt alg"> ABC1D23 </span>
                    <span class="txt alg"> 25anos </span>
                    <span class="vlr"> R$ 260,00 </span>
                    <span class="vlr"> R$ 1850,00 </span>
                    <span class="vlr"> R$ 2110,00 </span>
                    <span class="img"> <img src="imagens/btn_alterar.png" alt="Alterar" title="Alterar" ></span>
                    <span class="img"> <img src="imagens/btn_excluir.png" alt="Excluir" title="Excluir"></span>
                </div>

                <div class="veiculo">
                    <span class="txt"> Fusca </span>
                    <span class="txt"> VW </span>
                    <span class="txt alg"> ABC1D23 </span>
                    <span class="txt alg"> 25anos </span>
                    <span class="vlr"> R$ 260,00 </span>
                    <span class="vlr"> R$ 1850,00 </span>
                    <span class="vlr"> R$ 2110,00 </span>
                    <span class="img"> <img src="imagens/btn_alterar.png" alt="Alterar" title="Alterar" ></span>
                    <span class="img"> <img src="imagens/btn_excluir.png" alt="Excluir" title="Excluir"></span>
                </div>

                <div class="veiculo">
                    <span class="txt"> Fusca </span>
                    <span class="txt"> VW </span>
                    <span class="txt alg"> ABC1D23 </span>
                    <span class="txt alg"> 25anos </span>
                    <span class="vlr"> R$ 260,00 </span>
                    <span class="vlr"> R$ 1850,00 </span>
                    <span class="vlr"> R$ 2110,00 </span>
                    <span class="img"> <img src="imagens/btn_alterar.png" alt="Alterar" title="Alterar" ></span>
                    <span class="img"> <img src="imagens/btn_excluir.png" alt="Excluir" title="Excluir"></span>
                </div>
            </div>

        </div>

        </form>
    </div>
</body>

</html>
